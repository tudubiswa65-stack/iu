<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Realistic 3D Wallet – Transparent BG, Size Control</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #303030; /* only for preview, actual bg transparent */ }
        /* Info overlay is optional, kept minimal */
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="info">BLACK & GREEN • HYPER-REALISTIC 3D WALLET • NO BACKGROUND • SIZE CONTROLLABLE</div>

    <!-- Import Three.js and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        // =============================================================
        // SINGLE SIZE PARAMETER - Change this value to scale the icon
        // =============================================================
        const iconSize = 1.2;  // <-- ADJUST THIS TO CONTROL OVERALL SIZE (recommended range 0.5 to 2.5)
        // =============================================================

        // --- Initialize Scene with Transparent Background ---
        const scene = new THREE.Scene();
        scene.background = null; // transparent

        // --- Camera (will be positioned relative to size, but we keep view distance consistent for framing) ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5 * iconSize, 3 * iconSize, 8 * iconSize);
        camera.lookAt(0, 0.5 * iconSize, 0);

        // --- Renderer with alpha enabled for transparency ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.shadowMap.enabled = true; // keep shadows on for realism, but they won't show on transparent bg
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Controls: auto-rotate, zoom, pan disabled, target scaled accordingly ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2;
        controls.target.set(0, 0.5 * iconSize, 0);

        // --- Lighting (scaled intensity not needed, but positions relative to size) ---
        
        // Environment map (HDRI) for reflections
        const rgbeLoader = new RGBELoader();
        rgbeLoader.load('https://threejs.org/examples/textures/equirectangular/venice_sunset_1k.hdr', (texture) => {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = texture;
            // scene.background remains null
        });

        // Key light
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
        keyLight.position.set(2 * iconSize, 5 * iconSize, 3 * iconSize);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 1024;
        keyLight.shadow.mapSize.height = 1024;
        const d = 5 * iconSize;
        keyLight.shadow.camera.left = -d;
        keyLight.shadow.camera.right = d;
        keyLight.shadow.camera.top = d;
        keyLight.shadow.camera.bottom = -d;
        keyLight.shadow.camera.near = 2 * iconSize;
        keyLight.shadow.camera.far = 10 * iconSize;
        scene.add(keyLight);

        // Fill light
        const fillLight = new THREE.DirectionalLight(0xccddff, 0.6);
        fillLight.position.set(-3 * iconSize, 1 * iconSize, 4 * iconSize);
        scene.add(fillLight);

        // Back rim light (green accent)
        const rimLight = new THREE.DirectionalLight(0x22ff88, 0.8);
        rimLight.position.set(-2 * iconSize, 1 * iconSize, -5 * iconSize);
        scene.add(rimLight);

        // Green point light
        const greenPointLight = new THREE.PointLight(0x33ff99, 0.9, 6 * iconSize);
        greenPointLight.position.set(1 * iconSize, 1.2 * iconSize, 2 * iconSize);
        scene.add(greenPointLight);

        // Ambient light
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);

        // Bottom light
        const bottomLight = new THREE.PointLight(0x225533, 0.5);
        bottomLight.position.set(0, -1 * iconSize, 1 * iconSize);
        scene.add(bottomLight);

        // --- Create the Wallet Group and Apply the Size Scale ---
        const walletGroup = new THREE.Group();
        
        // Scale the entire wallet according to iconSize
        walletGroup.scale.set(iconSize, iconSize, iconSize);

        // ---- Main body (leather) ----
        const bodyGeo = new THREE.BoxGeometry(2.2, 1.0, 3.2);
        const bodyMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a0a,
            roughness: 0.35,
            metalness: 0.1,
            emissive: 0x000000,
            clearcoat: 0.9,
            clearcoatRoughness: 0.25,
            bumpMap: createLeatherBumpTexture(),
            bumpScale: 0.02,
            normalMap: createLeatherNormalTexture(),
            normalScale: new THREE.Vector2(0.8, 0.8)
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0.5;
        walletGroup.add(body);

        // ---- Green accent stripe ----
        const stripeGeo = new THREE.BoxGeometry(0.25, 0.15, 2.8);
        const stripeMat = new THREE.MeshStandardMaterial({
            color: 0x22dd88,
            emissive: 0x113322,
            roughness: 0.25,
            metalness: 0.3,
            emissiveIntensity: 0.6,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        });
        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
        stripe.castShadow = true;
        stripe.receiveShadow = true;
        stripe.position.set(0.7, 0.5, 0);
        walletGroup.add(stripe);

        // Second smaller stripe
        const stripe2Geo = new THREE.BoxGeometry(0.2, 0.1, 2.4);
        const stripe2Mat = new THREE.MeshStandardMaterial({
            color: 0x33aa77,
            emissive: 0x112211,
            roughness: 0.3,
            metalness: 0.2,
            emissiveIntensity: 0.4
        });
        const stripe2 = new THREE.Mesh(stripe2Geo, stripe2Mat);
        stripe2.castShadow = true;
        stripe2.receiveShadow = true;
        stripe2.position.set(-0.8, 0.55, 0.1);
        walletGroup.add(stripe2);

        // ---- Stitch details ----
        const stitchMat = new THREE.MeshStandardMaterial({
            color: 0x888888,
            roughness: 0.4,
            metalness: 0.1,
            emissive: 0x111111
        });
        const stitchPositions = [
            [-0.9, 0.95, -1.3], [0.9, 0.95, -1.3], [-0.9, 0.95, 1.3], [0.9, 0.95, 1.3],
            [-0.9, 0.95, -0.6], [0.9, 0.95, -0.6], [-0.9, 0.95, 0.6], [0.9, 0.95, 0.6],
            [-0.4, 0.95, -1.3], [0.4, 0.95, -1.3], [-0.4, 0.95, 1.3], [0.4, 0.95, 1.3]
        ];
        stitchPositions.forEach(pos => {
            const stitchGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.1, 8);
            const stitch = new THREE.Mesh(stitchGeo, stitchMat);
            stitch.rotation.x = Math.PI / 2;
            stitch.position.set(pos[0], pos[1], pos[2]);
            stitch.castShadow = true;
            stitch.receiveShadow = true;
            walletGroup.add(stitch);
        });

        // ---- Metal corners ----
        const cornerMat = new THREE.MeshStandardMaterial({
            color: 0x224433,
            roughness: 0.2,
            metalness: 0.9,
            emissive: 0x112211,
            emissiveIntensity: 0.3
        });
        const cornerPositions = [
            [-1.0, 0.1, -1.5], [1.0, 0.1, -1.5], [-1.0, 0.1, 1.5], [1.0, 0.1, 1.5],
            [-1.0, 0.9, -1.5], [1.0, 0.9, -1.5], [-1.0, 0.9, 1.5], [1.0, 0.9, 1.5]
        ];
        cornerPositions.forEach(pos => {
            const cornerGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.1, 16);
            const corner = new THREE.Mesh(cornerGeo, cornerMat);
            corner.rotation.x = Math.PI / 2;
            corner.position.set(pos[0], pos[1], pos[2]);
            corner.castShadow = true;
            corner.receiveShadow = true;
            walletGroup.add(corner);
        });

        // ---- Central strap ----
        const strapGeo = new THREE.BoxGeometry(0.4, 0.3, 2.0);
        const strapMat = new THREE.MeshStandardMaterial({
            color: 0x111111,
            roughness: 0.5,
            metalness: 0.1,
            emissive: 0x112211
        });
        const strap = new THREE.Mesh(strapGeo, strapMat);
        strap.castShadow = true;
        strap.receiveShadow = true;
        strap.position.set(0, 0.8, 0);
        walletGroup.add(strap);

        // Green accent on strap
        const strapAccentGeo = new THREE.BoxGeometry(0.2, 0.1, 1.6);
        const strapAccentMat = new THREE.MeshStandardMaterial({
            color: 0x33ee99,
            emissive: 0x224433,
            roughness: 0.2,
            metalness: 0.4,
            emissiveIntensity: 0.7
        });
        const strapAccent = new THREE.Mesh(strapAccentGeo, strapAccentMat);
        strapAccent.castShadow = true;
        strapAccent.receiveShadow = true;
        strapAccent.position.set(0, 0.8, 0);
        walletGroup.add(strapAccent);

        // Buckle
        const buckleGeo = new THREE.TorusGeometry(0.2, 0.05, 16, 32, Math.PI);
        const buckleMat = new THREE.MeshStandardMaterial({
            color: 0x33aa77,
            roughness: 0.15,
            metalness: 0.95,
            emissive: 0x112211
        });
        const buckle = new THREE.Mesh(buckleGeo, buckleMat);
        buckle.rotation.x = Math.PI / 2;
        buckle.rotation.z = Math.PI / 2;
        buckle.position.set(0, 0.8, 1.0);
        buckle.castShadow = true;
        buckle.receiveShadow = true;
        walletGroup.add(buckle);

        // Card outlines
        const cardLineMat = new THREE.MeshStandardMaterial({
            color: 0x224433,
            roughness: 0.3,
            metalness: 0.1,
            emissive: 0x112211,
            emissiveIntensity: 0.2
        });
        for (let i = -1; i <= 1; i+=2) {
            const lineGeo = new THREE.BoxGeometry(1.8, 0.02, 0.05);
            const line = new THREE.Mesh(lineGeo, cardLineMat);
            line.position.set(0, 0.3 + i*0.2, 1.2);
            line.castShadow = true;
            line.receiveShadow = true;
            walletGroup.add(line);
        }

        // Logo shape
        const logoGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.05, 6);
        const logoMat = new THREE.MeshStandardMaterial({
            color: 0x33ee99,
            emissive: 0x224433,
            roughness: 0.1,
            metalness: 0.3,
            emissiveIntensity: 0.8
        });
        const logo = new THREE.Mesh(logoGeo, logoMat);
        logo.rotation.x = Math.PI / 2;
        logo.rotation.z = Math.PI / 6;
        logo.position.set(-0.6, 0.25, -1.2);
        logo.castShadow = true;
        logo.receiveShadow = true;
        walletGroup.add(logo);

        scene.add(walletGroup);

        // --- Optional: Very subtle reflective plane (almost invisible, just to catch shadows and ground the icon, but transparent) ---
        // We make it nearly fully transparent and black to not distract, but it helps with shadow perception.
        const planeGeo = new THREE.CircleGeometry(4 * iconSize, 32);
        const planeMat = new THREE.MeshStandardMaterial({
            color: 0x000000,
            roughness: 0.2,
            metalness: 0.0,
            emissive: 0x112211,
            emissiveIntensity: 0.1,
            transparent: true,
            opacity: 0.15, // very subtle
            side: THREE.DoubleSide
        });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = 0.0;
        plane.receiveShadow = true;
        scene.add(plane);

        // --- Floating particles (very faint, for atmosphere) ---
        const particleCount = 40;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 10 * iconSize;
            particlePositions[i*3+1] = (Math.random() * 4 * iconSize);
            particlePositions[i*3+2] = (Math.random() - 0.5) * 10 * iconSize;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0x339966,
            size: 0.03 * iconSize,
            transparent: true,
            opacity: 0.2,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // --- Procedural texture generators (unchanged) ---
        function createLeatherBumpTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#808080';
            ctx.fillRect(0, 0, 256, 256);
            for (let i = 0; i < 6000; i++) {
                const x = Math.random() * 256;
                const y = Math.random() * 256;
                const r = Math.random() * 30 + 10;
                const bright = Math.random() * 50 + 100;
                ctx.fillStyle = `rgb(${bright}, ${bright}, ${bright})`;
                ctx.beginPath();
                ctx.arc(x, y, r * 0.1, 0, Math.PI * 2);
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2);
            return texture;
        }

        function createLeatherNormalTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#8080ff';
            ctx.fillRect(0, 0, 256, 256);
            for (let i = 0; i < 4000; i++) {
                const x = Math.random() * 256;
                const y = Math.random() * 256;
                const r = Math.random() * 20 + 5;
                const rVal = Math.floor(Math.random() * 100 + 78);
                const gVal = Math.floor(Math.random() * 100 + 78);
                ctx.fillStyle = `rgb(${rVal}, ${gVal}, 255)`;
                ctx.beginPath();
                ctx.arc(x, y, r * 0.15, 0, Math.PI * 2);
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2);
            return texture;
        }

        // --- Animation with bobbing effect (scaled movement) ---
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.002;
            walletGroup.position.y = Math.sin(time) * (0.03 * iconSize);
            walletGroup.rotation.y = Math.sin(time * 0.5) * 0.05;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // --- Resize handler ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
