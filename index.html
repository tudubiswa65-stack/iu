<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Wallet · Dark Grey & Gold</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #000000; /* pure black background */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* main container — provides 3D perspective */
        .scene {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            -webkit-perspective: 1200px;
        }

        /* wallet card – the entire 3D object */
        .wallet {
            width: 240px;                    /* base size */
            height: 160px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(4deg) rotateY(28deg) rotateZ(2deg);
            /* combined tilt ~30° Y, slight X and Z for natural look */
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), filter 0.3s;
            cursor: default;
            filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.7));
        }

        /* HOVER EFFECT: lift & deepen shadow */
        .wallet:hover {
            transform: rotateX(3deg) rotateY(26deg) rotateZ(1deg) translateY(-10px) translateZ(12px);
            filter: drop-shadow(0 28px 28px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 6px rgba(255, 215, 0, 0.2));
            transition: transform 0.35s ease-out, filter 0.3s;
        }

        /* all inner elements preserve 3d */
        .wallet > * {
            transform-style: preserve-3d;
        }

        /* ----- LEATHER BODY (main wallet) ----- */
        .wallet-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #2c2c2c;  /* dark grey base */
            border-radius: 18px 18px 16px 16px;   /* rounded corners, subtle */

            /* leather texture via multiple layered backgrounds */
            background-image: 
                /* fine grain pattern (tiny dots) */
                radial-gradient(circle at 30% 40%, rgba(70, 70, 70, 0.6) 1px, transparent 1px),
                radial-gradient(circle at 70% 80%, rgba(90, 90, 90, 0.5) 1px, transparent 1px),
                radial-gradient(circle at 10% 20%, rgba(100, 100, 100, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 85% 30%, rgba(80, 80, 80, 0.5) 1px, transparent 1px),
                /* subtle leather skin pattern (larger mottling) */
                radial-gradient(ellipse at 20% 30%, rgba(50, 50, 50, 0.3) 4px, transparent 8px),
                radial-gradient(ellipse at 90% 70%, rgba(60, 60, 60, 0.3) 6px, transparent 12px),
                /* base color with slight gradient for depth */
                linear-gradient(145deg, #262626 0%, #3a3a3a 70%, #2f2f2f 100%);

            background-size: 40px 40px, 60px 60px, 50px 50px, 70px 70px, 120px 120px, 150px 150px, 100% 100%;
            background-position: 0 0;
            background-repeat: repeat;

            box-shadow: 
                inset 0 -4px 8px rgba(0,0,0,0.6),
                inset 0 4px 5px rgba(255,255,255,0.05),
                0 4px 12px rgba(0,0,0,0.5);   /* subtle outer depth */

            border: 1px solid rgba(180, 150, 80, 0.15); /* very subtle gold shimmer */
            transform: translateZ(4px); /* slight thickness */
        }

        /* leather edge rounding effect (extra depth) */
        .wallet-body::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px 18px 16px 16px;
            box-shadow: inset 0 0 0 1px rgba(210, 180, 100, 0.2); /* fine gold edge */
            pointer-events: none;
        }

        /* ----- GOLDEN STITCHING (simulated with dashed gradient border + small dots) ----- */
        .stitching {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 18px 18px 16px 16px;
            background: transparent;
            /* main stitch line effect using two layers of dashed background */
            background-image: 
                repeating-linear-gradient( 
                    45deg, 
                    transparent, 
                    transparent 8px, 
                    rgba(205, 170, 70, 0.7) 8px, 
                    rgba(205, 170, 70, 0.7) 12px 
                ),
                repeating-linear-gradient( 
                    -45deg, 
                    transparent, 
                    transparent 8px, 
                    rgba(205, 170, 70, 0.6) 8px, 
                    rgba(205, 170, 70, 0.6) 12px 
                );
            background-repeat: no-repeat;
            background-size: 60px 100%, 60px 100%;
            background-position: 10px 0, 180px 0; /* stitch along left and right sides */
            mask-image: linear-gradient(to bottom, transparent 5%, black 20%, black 80%, transparent 95%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 5%, black 20%, black 80%, transparent 95%);
            opacity: 0.9;
            transform: translateZ(5px); /* slightly above leather */
            pointer-events: none;
        }

        /* additional tiny stitch dots along the top edge (more realism) */
        .stitching::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 10px;
            top: 5px;
            left: 10%;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 10px, 
                rgba(212, 175, 55, 0.8) 10px, 
                rgba(212, 175, 55, 0.8) 14px);
            border-radius: 2px;
            filter: blur(0.3px);
            opacity: 0.8;
        }

        /* bottom stitches */
        .stitching::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 10px;
            bottom: 5px;
            left: 10%;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 10px, 
                rgba(212, 175, 55, 0.8) 10px, 
                rgba(212, 175, 55, 0.8) 14px);
            border-radius: 2px;
            filter: blur(0.3px);
            opacity: 0.8;
        }

        /* ----- SIDE STRAP with gold button ----- */
        .strap {
            position: absolute;
            width: 36px;
            height: 60px;
            background: linear-gradient(150deg, #2b2b2b, #1f1f1f);
            right: -10px;
            top: 30px;
            border-radius: 20px 4px 12px 20px;
            box-shadow: 
                inset -2px -2px 5px rgba(0,0,0,0.8),
                inset 2px 2px 3px rgba(255,215,0,0.15),
                4px 6px 12px rgba(0,0,0,0.6);
            transform: rotate(4deg) translateZ(8px);
            border-left: 2px solid rgba(212, 175, 55, 0.4);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* gold metallic button */
        .button {
            position: absolute;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 30% 30%, #f5d742, #9e7e38);
            border-radius: 50%;
            top: 18px;
            left: -8px;
            box-shadow: 
                0 2px 6px rgba(0,0,0,0.7),
                inset -2px -2px 4px rgba(0,0,0,0.5),
                inset 1px 1px 4px #ffeeaa;
            transform: translateZ(10px);
            border: 1px solid #cfaa4a;
        }

        .button::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fff5cf, #d4a55e);
            border-radius: 50%;
            top: 5px;
            left: 5px;
            opacity: 0.9;
        }

        /* ----- CARDS (stack of two, gold gradient) ----- */
        .cards-stack {
            position: absolute;
            width: 70%;
            height: 70%;
            bottom: 12px;
            left: 15px;
            transform: translateZ(12px) rotate(1deg); /* slightly forward */
            transform-style: preserve-3d;
            filter: drop-shadow(2px 6px 10px rgba(0,0,0,0.7));
        }

        /* base card style (both cards share) */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: linear-gradient(135deg, #bf9f50 0%, #e9cf81 35%, #aa8840 100%);
            box-shadow: 
                inset 0 2px 8px rgba(255,245,180,0.6),
                inset 0 -4px 6px rgba(0,0,0,0.3),
                0 8px 14px rgba(0,0,0,0.5);
            border: 1px solid #f3db9a;
            transform-style: preserve-3d;
            backface-visibility: visible;
        }

        /* first card (lower) */
        .card-1 {
            transform: translateZ(2px) rotate(-1deg) translateY(8px) translateX(-2px);
            background: linear-gradient(125deg, #b49244, #ebcf86, #a47e34);
            filter: brightness(0.95);
        }

        /* second card (upper) – partially visible */
        .card-2 {
            transform: translateZ(12px) rotate(2deg) translateY(-4px) translateX(4px);
            background: linear-gradient(140deg, #dbb45c, #fcebb2, #b38d3a);
            box-shadow: 
                inset 0 2px 10px #fff3c9,
                inset 0 -3px 6px rgba(0,0,0,0.2),
                0 12px 18px rgba(0,0,0,0.6);
        }

        /* gold chip / logo hint on upper card (extra realism) */
        .card-2::before {
            content: '';
            position: absolute;
            width: 24px;
            height: 18px;
            background: linear-gradient(145deg, #ddb86a, #8f6f2a);
            bottom: 12px;
            right: 12px;
            border-radius: 4px;
            box-shadow: inset 0 0 0 1px #eacd81, 0 2px 4px black;
            transform: skewX(-5deg);
        }

        /* second card's embossed lines */
        .card-2::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 12px;
            top: 15px;
            left: 12px;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 8px, 
                rgba(255,240,150,0.5) 8px, 
                rgba(255,240,150,0.5) 12px);
            border-radius: 2px;
            opacity: 0.7;
        }

        /* small detail on first card (makes it distinct) */
        .card-1::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #ffefb0, #896e2c);
            bottom: 8px;
            left: 12px;
            opacity: 0.8;
            box-shadow: inset -1px -1px 3px black;
        }

        /* ----- subtle inner pocket flap (extra realism) ----- */
        .pocket-flap {
            position: absolute;
            width: 70%;
            height: 16px;
            background: linear-gradient(180deg, #2f2f2f, #1e1e1e);
            bottom: 26px;
            left: 12px;
            border-radius: 8px 8px 4px 4px;
            transform: translateZ(8px) rotate(1deg);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.7), 0 3px 6px rgba(0,0,0,0.4);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            opacity: 0.7;
        }

        /* subtle extra shadow to lift the wallet from bg */
        .wallet::after {
            content: '';
            position: absolute;
            inset: -10px -20px -20px -10px;
            background: transparent;
            box-shadow: 0 30px 30px -15px rgba(0,0,0,0.7);
            transform: translateZ(-20px);
            border-radius: 50%;
            filter: blur(6px);
            z-index: -1;
            pointer-events: none;
        }

        /* ensure all text/extra elements none */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
        }

        /* subtle responsive adjustment */
        @media (max-width: 400px) {
            .wallet {
                width: 200px;
                height: 133px;
            }
        }
    </style>
</head>
<body>
    <div class="scene">
        <!-- Wallet component with semantic structure -->
        <div class="wallet" role="figure" aria-label="Premium dark grey leather wallet with gold cards">
            <!-- Leather main body (background) -->
            <div class="wallet-body"></div>

            <!-- Golden stitching overlays -->
            <div class="stitching" aria-hidden="true"></div>

            <!-- Side strap with gold button -->
            <div class="strap" aria-hidden="true">
                <div class="button" aria-hidden="true"></div>
            </div>

            <!-- Stack of two golden cards inside wallet -->
            <div class="cards-stack" aria-hidden="true">
                <div class="card card-1"></div>
                <div class="card card-2"></div>
            </div>

            <!-- subtle pocket flap (extra detail) -->
            <div class="pocket-flap" aria-hidden="true"></div>

            <!-- hidden descriptive text for screen readers -->
            <span class="sr-only">Wallet with two gold credit cards visible, gold stitching and metallic button.</span>
        </div>
    </div>
</body>
</html>
