<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D leather wallet · premium UI</title>
    <style>
        /* RESET & GLOBAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #000000;  /* pure black background */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        /* 3D perspective container */
        .scene {
            perspective: 1200px;
            perspective-origin: 50% 50%;
        }

        /* MAIN WALLET – variable size, responsive */
        .wallet {
            position: relative;
            width: 240px;                /* fits 200–260px requirement */
            height: 160px;
            transform-style: preserve-3d;
            transform: rotateX(18deg) rotateY(12deg) rotateZ(4deg);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1), box-shadow 0.35s ease;
            box-shadow: 0 20px 28px -8px rgba(0, 0, 0, 0.8), 0 8px 10px -6px rgba(0, 0, 0, 0.7);
            border-radius: 18px;          /* base rounding, inherited by children */
        }

        /* HOVER – lift & deeper shadow */
        .wallet:hover {
            transform: rotateX(16deg) rotateY(10deg) rotateZ(3deg) translateY(-12px);
            box-shadow: 0 34px 44px -10px rgba(0, 0, 0, 0.95), 0 12px 18px -8px rgba(0, 0, 0, 0.9);
        }

        /* all inner layers positioned absolutely */
        .wallet > * {
            position: absolute;
            inset: 0;
            pointer-events: none;        /* let hover pass through, but we keep it on wallet */
        }

        /* allow pointer events on the whole wallet for hover */
        .wallet {
            pointer-events: auto;
        }

        /* ---------- BASE BACK (leather body + golden stitching) ---------- */
        .wallet-back {
            background: #26221f;           /* deep grey leather base */
            background-image: radial-gradient(circle at 30% 35%, rgba(80, 70, 60, 0.3) 1px, transparent 1px),
                              radial-gradient(circle at 70% 60%, rgba(100, 85, 70, 0.25) 1px, transparent 1px);
            background-size: 24px 24px, 30px 30px;
            border-radius: 18px;
            border: 2.5px dashed #c9a347;  /* golden stitching effect */
            box-shadow: inset 0 2px 6px rgba(255, 255, 240, 0.08),   /* soft light reflection */
                        inset 0 -3px 8px rgba(0, 0, 0, 0.6),
                        0 0 0 1px rgba(0,0,0,0.35);                 /* fine edge definition */
            z-index: 1;
        }

        /* ---------- STACKED GOLDEN CARDS (partially visible) ---------- */
        .cards {
            position: absolute;
            top: 12px;                    /* 8% of 160 ≈ 12px */
            left: 12px;
            width: 216px;                  /* 90% of 240 */
            height: 112px;                  /* 70% of 160 – cards area */
            z-index: 2;
            /* container for absolutely positioned cards */
            pointer-events: none;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 60px;
            border-radius: 10px 10px 8px 8px;
            background: linear-gradient(148deg, #bf9530, #f5e79e, #b8860b, #e5c56a);
            background-size: 200% 150%;
            box-shadow: 0 8px 12px -6px rgba(0, 0, 0, 0.7),
                        inset 0 2px 3px rgba(255, 245, 190, 0.5),
                        inset 0 -2px 4px rgba(0, 0, 0, 0.3);
            border-left: 1px solid rgba(255, 215, 0, 0.25);
            border-right: 1px solid rgba(200, 150, 30, 0.4);
            transform: rotate(0.2deg);      /* subtle natural offset */
            backdrop-filter: blur(0.5px);   · tiny smoothness */
        }

        /* first card (top) */
        .card1 {
            top: 0;
            z-index: 4;
            background-position: 10% 20%;
        }

        /* second card (stacked behind, partially visible) */
        .card2 {
            top: 18px;                      /* overlap */
            z-index: 3;
            background-position: 70% 40%;
            filter: brightness(0.98);
            box-shadow: 0 6px 10px -4px rgba(0, 0, 0, 0.7),
                        inset 0 1px 3px rgba(255, 235, 140, 0.6);
        }

        /* subtle chip hint on top card (tiny gold rectangle) */
        .card1::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 18px;
            width: 22px;
            height: 16px;
            background: linear-gradient(135deg, #dbb257, #a67c1e);
            border-radius: 4px 2px 4px 2px;
            box-shadow: inset 0 -1px 2px #3a2e0e, 0 1px 2px black;
            border: 1px solid #ebc258;
        }

        /* ---------- FRONT POCKET (leather, with strap & button) ---------- */
        .front-pocket {
            position: absolute;
            bottom: 0;
            left: 12px;                     /* 5% of 240 ≈ 12px */
            width: 216px;
            height: 96px;                    /* 60% of 160 */
            background: #2b2622;              /* warm dark grey leather */
            background-image: radial-gradient(circle at 25% 40%, #3f3730 1.2px, transparent 1.2px),
                              radial-gradient(circle at 68% 72%, #3b332b 1px, transparent 1px);
            background-size: 20px 20px, 28px 28px;
            border-radius: 0 0 18px 18px;    /* only bottom corners rounded */
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.7),
                        inset 0 -2px 4px rgba(255, 220, 150, 0.1),
                        0 -2px 4px rgba(0,0,0,0.5);
            z-index: 5;                       /* above cards & base */
            /* pocket edge hint: subtle top line */
            border-top: 1px solid #564b41;
            pointer-events: none;
        }

        /* side strap (fixed to right edge of pocket) */
        .strap {
            position: absolute;
            right: -8px;                      /* protrudes slightly over stitching */
            top: 26px;
            width: 14px;
            height: 44px;
            background: linear-gradient(90deg, #4d443c, #29231f, #4d443c);
            border-radius: 6px 4px 8px 4px;
            box-shadow: -2px 3px 6px rgba(0,0,0,0.6),
                        inset 0 1px 3px #9f8b78,
                        inset 0 -2px 3px #1f1b17;
            transform: skewY(-1deg);
            z-index: 7;
            pointer-events: none;
        }

        /* golden metallic button on strap */
        .button {
            position: absolute;
            top: -6px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 30% 30%, #fce39c, #b57c1a, #7f5f20);
            border-radius: 50%;
            box-shadow: 0 2px 5px #00000099, inset 0 1px 3px #ffe68f, 0 0 0 1px #514128;
            border: 1px solid transparent;
            transform: rotate(4deg);
            z-index: 8;
        }

        /* small extra lighting on strap */
        .strap::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 4px;
            height: 10px;
            background: linear-gradient(to bottom, rgba(255,235,180,0.35), transparent);
            border-radius: 2px;
            opacity: 0.8;
        }

        /* additional fine shadow to lift the whole wallet */
        .wallet::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            box-shadow: inset 0 0 0 1px rgba(190, 145, 70, 0.15);   /* very subtle gold edge */
            pointer-events: none;
            z-index: 10;
        }

        /* guarantee that cards remain above base but under front pocket where needed */
        .cards {
            z-index: 3;
        }

        /* tiny details: card shadows on pocket edge */
        .card1, .card2 {
            transition: transform 0.2s;
        }

        /* no hover on cards, wallet hover already does job */

        /* responsiveness: scales down a bit on small screens */
        @media (max-width: 480px) {
            .wallet {
                width: 200px;
                height: 134px;
            }
            .cards {
                top: 10px;
                left: 10px;
                width: 180px;
                height: 94px;
            }
            .front-pocket {
                left: 10px;
                width: 180px;
                height: 80px;
            }
            .card {
                height: 50px;
            }
            .card2 {
                top: 15px;
            }
            .strap {
                right: -7px;
                height: 38px;
                width: 12px;
                top: 20px;
            }
            .button {
                width: 10px;
                height: 10px;
                top: -5px;
            }
        }
    </style>
</head>
<body>
    <div class="scene">
        <!-- WALLET component – pure CSS, no images -->
        <div class="wallet">

            <!-- base leather layer with golden dashed stitching (border) -->
            <div class="wallet-back"></div>

            <!-- two gold cards stacked, partially protruding -->
            <div class="cards">
                <div class="card card1"></div>
                <div class="card card2"></div>
            </div>

            <!-- front pocket (lower part) with side strap & gold button -->
            <div class="front-pocket">
                <div class="strap">
                    <div class="button"></div>
                </div>
            </div>

            <!-- subtle extra shadows are added via pseudo-elements -->
        </div>
    </div>

    <!-- design note: all materials are synthetic (gradients, shadows) – no image assets -->
    <!-- leather texture simulated by fine radial gradients, stitching by dashed border -->
</body>
</html>
