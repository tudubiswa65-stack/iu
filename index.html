<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Wallet Icon</title>
<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
canvas{
background:transparent;
}
</style>
</head><body><script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script><script>

// Scene
const scene = new THREE.Scene()

// Camera
const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,1.5,5)

// Renderer with transparent background
const renderer = new THREE.WebGLRenderer({
alpha:true,
antialias:true
})

renderer.setSize(500,500)
renderer.setClearColor(0x000000,0)

document.body.appendChild(renderer.domElement)

// Light
const light = new THREE.DirectionalLight(0xffffff,1.2)
light.position.set(5,10,7)
scene.add(light)

const ambient = new THREE.AmbientLight(0xffffff,0.5)
scene.add(ambient)


// Wallet Body
const walletGeometry = new THREE.BoxGeometry(3,1.6,0.6)

const walletMaterial = new THREE.MeshStandardMaterial({
color:0x3a3f4b,
metalness:0.3,
roughness:0.6
})

const wallet = new THREE.Mesh(walletGeometry,walletMaterial)

scene.add(wallet)


// Strap
const strapGeometry = new THREE.BoxGeometry(0.4,1.6,0.5)

const strapMaterial = new THREE.MeshStandardMaterial({
color:0x2e323c
})

const strap = new THREE.Mesh(strapGeometry,strapMaterial)

strap.position.x = 1.3
scene.add(strap)


// Gold Cards
const cardMaterial = new THREE.MeshStandardMaterial({
color:0xd4a017,
metalness:0.9,
roughness:0.2
})

function createCard(offset){

const geometry = new THREE.BoxGeometry(2.5,1.3,0.05)

const card = new THREE.Mesh(geometry,cardMaterial)

card.position.z = offset
card.position.y = 0.1

scene.add(card)

}

createCard(0.25)
createCard(0.35)
createCard(0.45)


// Animation
function animate(){

requestAnimationFrame(animate)

wallet.rotation.y += 0.005

renderer.render(scene,camera)

}

animate()

</script></body>
</html>
